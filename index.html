<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LUISA PRO - IA Financeira</title>
    
    <link rel="icon" type="image/png" href="https://i.ibb.co/CKJMn29m/Logo-Luisa-Pro.png">
    <link rel="apple-touch-icon" href="https://i.ibb.co/CKJMn29m/Logo-Luisa-Pro.png">
    <link rel="manifest" href="./manifest.json">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000; color: #f4f4f5; -webkit-font-smoothing: antialiased; }
        
        #app-loader {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.6s;
        }
        #app-loader.fade-out { opacity: 0; pointer-events: none; }
        .loader-logo { width: 140px; height: 140px; object-fit: contain; filter: drop-shadow(0 0 20px rgba(99,102,241,0.4)); animation: pulse 2.5s infinite; }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        .view-section { display: none; padding: 8rem 2rem 6rem; max-width: 90rem; margin: 0 auto; }
        .view-section.active { display: block; animation: fadeInUp 0.5s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        
        #navbar {
            position: fixed; top: 0; width: 100%; z-index: 50;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 0 1rem;
        }
        .nav-container { max-width: 90rem; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 64px; }
        .tab-btn {
            padding: 0.5rem 1rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500;
            transition: all 0.3s; color: #a1a1aa; background: transparent; border: none; cursor: pointer;
        }
        .tab-btn:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .tab-btn.active { background: #27272a; color: #fff; box-shadow: 0 0 20px rgba(255,255,255,0.05); }
        
        .card {
            background: rgba(24,24,27,0.4); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 2rem; padding: 2rem; backdrop-filter: blur(12px);
            transition: all 0.3s;
        }
        .card:hover { border-color: rgba(255,255,255,0.1); }
        
        .chat-message { padding: 0.75rem 1rem; border-radius: 1rem; margin-bottom: 0.5rem; max-width: 85%; }
        .chat-user { background: #27272a; margin-left: auto; }
        .chat-ai { background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.2); }
        
        .score-ring {
            width: 120px; height: 120px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: 800; position: relative;
            background: conic-gradient(from 0deg, #818cf8 0%, #818cf8 var(--score), #27272a var(--score));
        }
        .score-ring::before { content: ''; position: absolute; inset: 4px; border-radius: 50%; background: #000; }
        .score-ring .score-text { position: relative; z-index: 1; }
        
        @media (max-width: 768px) {
            .view-section { padding: 6rem 1rem 8rem; }
            .nav-container { height: 56px; }
            .tab-btn { padding: 0.35rem 0.75rem; font-size: 0.7rem; }
            .mobile-nav {
                position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%);
                width: 95%; max-width: 400px; z-index: 50;
                background: rgba(24,24,27,0.95); backdrop-filter: blur(20px);
                border: 1px solid rgba(255,255,255,0.1); border-radius: 9999px;
                padding: 0.35rem; display: flex; justify-content: space-around; overflow-x: auto;
            }
            .mobile-nav .tab-btn { font-size: 0.6rem; padding: 0.35rem 0.5rem; white-space: nowrap; }
        }
        
        .modal-overlay {
            display: none; position: fixed; inset: 0; z-index: 60;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(12px);
            align-items: center; justify-content: center; padding: 1rem;
        }
        .modal-overlay.open { display: flex; }
        .modal-content {
            background: #18181b; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 2rem; max-width: 600px; width: 100%;
            max-height: 90vh; overflow-y: auto; padding: 2rem;
        }
    </style>
</head>
<body>

<!-- LOADER -->
<div id="app-loader">
    <img src="https://i.ibb.co/CKJMn29m/Logo-Luisa-Pro.png" class="loader-logo">
    <h1 class="text-3xl font-bold text-white">LUISA <span class="font-light text-zinc-500">PRO</span></h1>
    <p class="text-xs text-white/50 uppercase tracking-[2px] mt-1">IA Financeira</p>
    <div class="loader-bar-container"><div class="loader-bar"></div></div>
    <p class="absolute bottom-10 text-[10px] text-white/30">Desenvolvido por Lucas Rocha</p>
</div>

<!-- LOGIN -->
<div id="login-view" class="hidden min-h-screen flex items-center justify-center p-6 bg-black">
    <div class="w-full max-w-md bg-zinc-900/40 border border-white/10 rounded-3xl p-8 backdrop-blur-2xl">
        <div class="text-center mb-8">
            <img src="https://i.ibb.co/CKJMn29m/Logo-Luisa-Pro.png" class="w-20 h-20 mx-auto mb-4 object-contain">
            <h1 class="text-3xl font-bold text-white">LUISA <span class="font-light text-zinc-500">PRO</span></h1>
            <p class="text-zinc-500 text-sm">Sistema Financeiro com IA</p>
        </div>
        <form id="login-form" class="space-y-4">
            <input type="text" id="login-username" placeholder="Usuário" class="w-full bg-black/40 border border-white/10 rounded-2xl p-4 text-white focus:border-indigo-500 outline-none">
            <input type="password" id="login-password" placeholder="Senha" class="w-full bg-black/40 border border-white/10 rounded-2xl p-4 text-white focus:border-indigo-500 outline-none">
            <div id="login-error" class="hidden text-rose-400 text-sm text-center"></div>
            <button type="submit" class="w-full bg-white text-black font-bold p-4 rounded-2xl hover:bg-zinc-200 transition">Entrar</button>
        </form>
    </div>
</div>

<!-- MAIN APP -->
<div id="main-app" class="hidden">
    <!-- NAVBAR -->
    <nav id="navbar">
        <div class="nav-container">
            <div onclick="switchTab('home')" class="flex items-center gap-2 cursor-pointer">
                <img src="https://i.ibb.co/CKJMn29m/Logo-Luisa-Pro.png" class="w-8 h-8 object-contain">
                <span class="font-semibold hidden sm:block">LUISA <span class="text-zinc-600 font-light">PRO</span></span>
            </div>
            <div class="hidden md:flex gap-1">
                <button onclick="switchTab('home')" class="tab-btn active" data-tab="home">Início</button>
                <button onclick="switchTab('dashboard')" class="tab-btn" data-tab="dashboard">Dashboard</button>
                <button onclick="switchTab('bills')" class="tab-btn" data-tab="bills">Contas</button>
                <button onclick="switchTab('ai')" class="tab-btn" data-tab="ai">🤖 IA</button>
                <button onclick="switchTab('users')" class="tab-btn" data-tab="users">Config</button>
            </div>
            <div class="flex items-center gap-4">
                <span id="current-user-name" class="text-sm font-semibold hidden md:block"></span>
                <div id="current-user-avatar" class="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center text-sm font-bold">U</div>
                <button onclick="logout()" class="text-zinc-600 hover:text-rose-500 transition"><i data-lucide="log-out" class="w-5 h-5"></i></button>
            </div>
        </div>
    </nav>

    <!-- MOBILE NAV -->
    <div class="mobile-nav md:hidden">
        <button onclick="switchTab('home')" class="tab-btn active" data-tab="home">Início</button>
        <button onclick="switchTab('dashboard')" class="tab-btn" data-tab="dashboard">Dash</button>
        <button onclick="switchTab('bills')" class="tab-btn" data-tab="bills">Contas</button>
        <button onclick="switchTab('ai')" class="tab-btn" data-tab="ai">🤖</button>
        <button onclick="switchTab('users')" class="tab-btn" data-tab="users">Config</button>
    </div>

    <!-- VIEWS -->
    <section id="view-home" class="view-section active"></section>
    <section id="view-dashboard" class="view-section"></section>
    <section id="view-bills" class="view-section"></section>
    <section id="view-ai" class="view-section"></section>
    <section id="view-users" class="view-section"></section>
</div>

<!-- MODALS -->
<div id="modal-transaction" class="modal-overlay"><div class="modal-content" id="modal-content"></div></div>
<div id="modal-user" class="modal-overlay"><div class="modal-content"></div></div>
<div id="modal-category" class="modal-overlay"><div class="modal-content"></div></div>
<div id="modal-details" class="modal-overlay"><div class="modal-content"></div></div>

<script>
    // ============================================================
    // CONFIGURAÇÃO
    // ============================================================
    const API_URL = "https://script.google.com/macros/s/AKfycbx3_Mvtn3GZAt6d63Su9czCnOiW4uRBMznkwwqG-YzVEfkx9AtgCpd7MGKLE8qbHzuT-w/exec";
    const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    const YEARS = [2023,2024,2025,2026,2027];

    let state = {
        currentUser: null,
        users: [],
        transactions: [],
        categories: [],
        activeTab: 'home',
        homeFilter: { month: new Date().getMonth(), year: new Date().getFullYear() }
    };

    // ============================================================
    // LOADER E INICIALIZAÇÃO
    // ============================================================
    window.addEventListener('load', () => {
        setTimeout(() => {
            document.getElementById('app-loader').classList.add('fade-out');
            document.getElementById('login-view').classList.remove('hidden');
        }, 2000);
        loadData();
        lucide.createIcons();
    });

    async function loadData() {
        try {
            const res = await fetch(`${API_URL}?action=getAllData`).then(r => r.json());
            state.users = res.users || [];
            state.transactions = res.transactions || [];
            state.categories = res.categories || [];
        } catch(e) { console.error(e); }
    }

    // ============================================================
    // LOGIN
    // ============================================================
    document.getElementById('login-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const user = document.getElementById('login-username').value;
        const pass = document.getElementById('login-password').value;
        
        if(user === 'lucasrocha' && pass === '2025') {
            const admin = state.users.find(u => u.username === 'lucasrocha') || 
                         { id: 999, username: 'lucasrocha', name: 'Lucas Rocha', role: 'Administrador', avatar: 'LR', color: 'from-blue-500 to-cyan-500' };
            doLogin(admin);
            return;
        }
        
        const found = state.users.find(u => u.username === user && u.password == pass);
        if(found) doLogin(found);
        else {
            const err = document.getElementById('login-error');
            err.classList.remove('hidden');
            err.innerText = "Usuário ou senha incorretos!";
        }
    });

    function doLogin(user) {
        state.currentUser = user;
        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        document.getElementById('current-user-name').innerText = user.name;
        document.getElementById('current-user-avatar').innerText = user.avatar || user.name[0];
        renderApp();
    }

    function logout() {
        state.currentUser = null;
        document.getElementById('main-app').classList.add('hidden');
        document.getElementById('login-view').classList.remove('hidden');
    }

    // ============================================================
    // NAVEGAÇÃO
    // ============================================================
    function switchTab(tab) {
        state.activeTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.tab === tab);
        });
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.getElementById(`view-${tab}`).classList.add('active');
        renderView(tab);
    }

    function renderApp() { renderView(state.activeTab); }

    function renderView(tab) {
        if(tab === 'home') renderHome();
        else if(tab === 'dashboard') renderDashboard();
        else if(tab === 'bills') renderBills();
        else if(tab === 'ai') renderAI();
        else if(tab === 'users') renderUsers();
        lucide.createIcons();
    }

    // ============================================================
    // HELPERS
    // ============================================================
    function getFilteredTransactions() {
        return state.transactions;
    }

    function formatCurrency(val) {
        return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val);
    }

    function safeGetYearMonth(dateStr) {
        if(!dateStr) return {y:0, m:0};
        if(typeof dateStr === 'string' && dateStr.includes('-')) {
            const p = dateStr.split('-');
            return {y: parseInt(p[0]), m: parseInt(p[1]) - 1};
        }
        const d = new Date(dateStr);
        return {y: d.getFullYear(), m: d.getMonth()};
    }

    // ============================================================
    // VIEW: HOME
    // ============================================================
    function renderHome() {
        const { month, year } = state.homeFilter;
        let rev = 0, exp = 0, total = 0;
        
        getFilteredTransactions().forEach(t => {
            if(t.type === 'single') {
                const {y, m} = safeGetYearMonth(t.date);
                if(m === month && y === year) {
                    t.kind === 'income' ? rev += t.value : exp += t.value;
                }
                if(y < year || (y === year && m <= month)) {
                    t.kind === 'income' ? total += t.value : total -= t.value;
                }
            } else if(t.type === 'installment' && t.installments) {
                t.installments.forEach(i => {
                    const {y, m} = safeGetYearMonth(i.date);
                    if(m === month && y === year) {
                        t.kind === 'income' ? rev += i.value : exp += i.value;
                    }
                    if(y < year || (y === year && m <= month)) {
                        t.kind === 'income' ? total += i.value : total -= i.value;
                    }
                });
            }
        });

        document.getElementById('view-home').innerHTML = `
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                <div>
                    <h1 class="text-4xl font-bold text-white">Resumo Financeiro</h1>
                    <p class="text-zinc-500">${MONTHS[month]} ${year}</p>
                </div>
                <div class="flex gap-2">
                    <select onchange="updateHomeFilter('month', this.value)" class="bg-zinc-900 border border-white/10 text-white p-2 rounded-xl text-sm">
                        ${MONTHS.map((m,i) => `<option value="${i}" ${i===month?'selected':''}>${m}</option>`).join('')}
                    </select>
                    <select onchange="updateHomeFilter('year', this.value)" class="bg-zinc-900 border border-white/10 text-white p-2 rounded-xl text-sm">
                        ${YEARS.map(y => `<option value="${y}" ${y===year?'selected':''}>${y}</option>`).join('')}
                    </select>
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div class="card">
                    <div class="flex items-center gap-3 mb-2">
                        <div class="w-10 h-10 rounded-full bg-emerald-500/10 flex items-center justify-center">
                            <i data-lucide="trending-up" class="w-5 h-5 text-emerald-400"></i>
                        </div>
                        <span class="text-zinc-400 text-sm">Receitas</span>
                    </div>
                    <h2 class="text-4xl font-bold text-emerald-400">${formatCurrency(rev)}</h2>
                </div>
                <div class="card">
                    <div class="flex items-center gap-3 mb-2">
                        <div class="w-10 h-10 rounded-full bg-rose-500/10 flex items-center justify-center">
                            <i data-lucide="trending-down" class="w-5 h-5 text-rose-400"></i>
                        </div>
                        <span class="text-zinc-400 text-sm">Despesas</span>
                    </div>
                    <h2 class="text-4xl font-bold text-rose-400">${formatCurrency(exp)}</h2>
                </div>
            </div>
            
            <div class="card bg-gradient-to-r from-indigo-900/30 to-purple-900/30 border-indigo-500/20">
                <div class="flex items-center gap-4">
                    <div class="w-14 h-14 rounded-full bg-indigo-500/20 flex items-center justify-center">
                        <i data-lucide="wallet" class="w-7 h-7 text-indigo-400"></i>
                    </div>
                    <div>
                        <p class="text-zinc-400 text-sm">Saldo Acumulado</p>
                        <h2 class="text-3xl font-bold ${total >= 0 ? 'text-white' : 'text-rose-400'}">${formatCurrency(total)}</h2>
                    </div>
                </div>
            </div>
        `;
    }

    function updateHomeFilter(key, value) {
        state.homeFilter[key] = Number(value);
        renderHome();
    }

    // ============================================================
    // VIEW: DASHBOARD
    // ============================================================
    function renderDashboard() {
        const month = new Date().getMonth();
        const year = new Date().getFullYear();
        let rev = 0, exp = 0, total = 0;
        let categories = {};

        getFilteredTransactions().forEach(t => {
            if(t.type === 'single') {
                const {y, m} = safeGetYearMonth(t.date);
                if(m === month && y === year) {
                    t.kind === 'income' ? rev += t.value : exp += t.value;
                    if(t.kind === 'expense') {
                        categories[t.category] = (categories[t.category] || 0) + t.value;
                    }
                }
                if(y < year || (y === year && m <= month)) {
                    t.kind === 'income' ? total += t.value : total -= t.value;
                }
            } else if(t.type === 'installment' && t.installments) {
                t.installments.forEach(i => {
                    const {y, m} = safeGetYearMonth(i.date);
                    if(m === month && y === year) {
                        t.kind === 'income' ? rev += i.value : exp += i.value;
                        if(t.kind === 'expense') {
                            categories[t.category] = (categories[t.category] || 0) + i.value;
                        }
                    }
                    if(y < year || (y === year && m <= month)) {
                        t.kind === 'income' ? total += i.value : total -= i.value;
                    }
                });
            }
        });

        // Top 3 categorias
        const topCategories = Object.entries(categories)
            .sort((a,b) => b[1] - a[1])
            .slice(0, 3);

        document.getElementById('view-dashboard').innerHTML = `
            <h2 class="text-3xl font-bold text-white mb-8">Dashboard</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="card">
                    <p class="text-zinc-400 text-sm">Saldo Total</p>
                    <h3 class="text-2xl font-bold ${total >= 0 ? 'text-emerald-400' : 'text-rose-400'}">${formatCurrency(total)}</h3>
                </div>
                <div class="card">
                    <p class="text-zinc-400 text-sm">Receitas (Mês)</p>
                    <h3 class="text-2xl font-bold text-emerald-400">${formatCurrency(rev)}</h3>
                </div>
                <div class="card">
                    <p class="text-zinc-400 text-sm">Despesas (Mês)</p>
                    <h3 class="text-2xl font-bold text-rose-400">${formatCurrency(exp)}</h3>
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="card">
                    <h4 class="text-zinc-300 font-semibold mb-4">Top Categorias de Gastos</h4>
                    ${topCategories.length > 0 ? topCategories.map(([cat, val]) => `
                        <div class="flex justify-between items-center py-2 border-b border-white/5">
                            <span class="text-zinc-300">${cat}</span>
                            <span class="text-rose-400 font-mono">${formatCurrency(val)}</span>
                        </div>
                    `).join('') : '<p class="text-zinc-500 text-sm">Nenhum gasto registrado</p>'}
                </div>
                
                <div class="card">
                    <h4 class="text-zinc-300 font-semibold mb-4">Saúde Financeira</h4>
                    <div class="flex items-center gap-6">
                        <div class="score-ring" style="--score: ${total > 0 ? Math.min((total/(rev||1))*100, 100) : 0}%">
                            <span class="score-text text-white">${total > 0 ? Math.round((total/(rev||1))*100) : 0}%</span>
                        </div>
                        <div>
                            <p class="text-sm text-zinc-400">Score baseado no</p>
                            <p class="text-sm text-zinc-400">saldo acumulado</p>
                            <p class="text-xs text-zinc-500 mt-2">${total > 0 ? '✅ Saúde financeira boa' : '⚠️ Atenção! Saldo negativo'}</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="mt-6 card">
                <h4 class="text-zinc-300 font-semibold mb-4">💡 Dica da IA</h4>
                <p class="text-zinc-400">${gerarDicaFinanceira(total, rev, exp)}</p>
            </div>
        `;
    }

    // ============================================================
    // VIEW: CONTAS (BILLS)
    // ============================================================
    function renderBills() {
        const bills = getFilteredTransactions().filter(t => t.kind === 'expense');
        
        document.getElementById('view-bills').innerHTML = `
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-bold text-white">Contas a Pagar</h2>
                <button onclick="openTransactionModal('expense')" class="bg-white text-black px-4 py-2 rounded-xl text-sm font-bold hover:bg-zinc-200 transition">
                    <i data-lucide="plus" class="w-4 h-4 inline"></i> Nova Conta
                </button>
            </div>
            
            <div class="card">
                ${bills.map(t => `
                    <div onclick="openDetails('${t.id}')" class="flex justify-between items-center p-4 border-b border-white/5 hover:bg-white/5 transition cursor-pointer">
                        <div>
                            <p class="text-white font-medium">${t.name}</p>
                            <p class="text-xs text-zinc-500">${t.store || ''} • ${t.category}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-rose-400 font-mono">${formatCurrency(t.value)}</p>
                            <p class="text-xs text-zinc-500">${t.date}</p>
                        </div>
                    </div>
                `).join('') || '<p class="text-zinc-500 text-center py-8">Nenhuma conta registrada</p>'}
            </div>
        `;
    }

    // ============================================================
    // VIEW: IA (INTELIGÊNCIA ARTIFICIAL)
    // ============================================================
    function renderAI() {
        document.getElementById('view-ai').innerHTML = `
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-3xl font-bold text-white">🤖 IA Financeira</h2>
                    <p class="text-zinc-500 text-sm">Assistente inteligente para suas finanças</p>
                </div>
                <button onclick="analisarFinancas()" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-sm font-bold hover:bg-indigo-500 transition">
                    <i data-lucide="refresh-cw" class="w-4 h-4 inline"></i> Analisar Agora
                </button>
            </div>
            
            <div id="ai-results" class="space-y-6">
                ${gerarAnaliseCompleta()}
            </div>
            
            <div class="mt-8 card">
                <h4 class="text-zinc-300 font-semibold mb-4">💬 Pergunte à IA</h4>
                <div id="chat-container" class="space-y-2 max-h-96 overflow-y-auto mb-4">
                    <div class="chat-message chat-ai">Olá! Sou sua assistente financeira. Pergunte sobre seus gastos, planejamento ou dicas de economia.</div>
                </div>
                <div class="flex gap-2">

    // ============================================================
    // FUNÇÕES DE IA (SISTEMA ESPECIALISTA)
    // ============================================================
    
    function gerarAnaliseCompleta() {
        const transacoes = getFilteredTransactions();
        const hoje = new Date();
        const mesAtual = hoje.getMonth();
        const anoAtual = hoje.getFullYear();
        
        let receitasMes = 0, despesasMes = 0;
        let totalReceitas = 0, totalDespesas = 0;
        let contasVencendo = [];
        let categoriasGastos = {};
        
        transacoes.forEach(t => {
            if(t.type === 'single') {
                const {y, m} = safeGetYearMonth(t.date);
                if(m === mesAtual && y === anoAtual) {
                    t.kind === 'income' ? receitasMes += t.value : despesasMes += t.value;
                }
                t.kind === 'income' ? totalReceitas += t.value : totalDespesas += t.value;
                
                if(t.kind === 'expense') {
                    categoriasGastos[t.category] = (categoriasGastos[t.category] || 0) + t.value;
                }
                
                // Verificar vencimentos próximos (1 dia)
                const dataVenc = new Date(t.date + "T00:00:00");
                const diffDias = Math.ceil((dataVenc - hoje) / (1000 * 60 * 60 * 24));
                if(t.kind === 'expense' && diffDias >= 0 && diffDias <= 1 && t.status !== 'Pago') {
                    contasVencendo.push({ nome: t.name, valor: t.value, data: t.date });
                }
            } else if(t.type === 'installment' && t.installments) {
                t.installments.forEach(i => {
                    const {y, m} = safeGetYearMonth(i.date);
                    if(m === mesAtual && y === anoAtual) {
                        t.kind === 'income' ? receitasMes += i.value : despesasMes += i.value;
                    }
                    t.kind === 'income' ? totalReceitas += i.value : totalDespesas += i.value;
                    
                    if(t.kind === 'expense') {
                        categoriasGastos[t.category] = (categoriasGastos[t.category] || 0) + i.value;
                    }
                    
                    const dataVenc = new Date(i.date + "T00:00:00");
                    const diffDias = Math.ceil((dataVenc - hoje) / (1000 * 60 * 60 * 24));
                    if(t.kind === 'expense' && diffDias >= 0 && diffDias <= 1 && i.status !== 'Pago') {
                        contasVencendo.push({ nome: `${t.name} (Parcela ${i.number})`, valor: i.value, data: i.date });
                    }
                });
            }
        });

        const saldo = totalReceitas - totalDespesas;
        const mesSaldo = receitasMes - despesasMes;
        
        // Análises
        let alertas = [];
        let recomendacoes = [];
        let score = 0;
        
        // 1. Análise de vencimentos
        if(contasVencendo.length > 0) {
            alertas.push(`⚠️ ${contasVencendo.length} conta(s) vence(m) amanhã!`);
        }
        
        // 2. Análise de gastos excessivos
        const gastoMedio = despesasMes / 30 || 0;
        if(gastoMedio > 100) {
            alertas.push(`📊 Seu gasto médio diário é de ${formatCurrency(gastoMedio)}.`);
        }
        
        const topCategoria = Object.entries(categoriasGastos).sort((a,b) => b[1] - a[1])[0];
        if(topCategoria && topCategoria[1] > despesasMes * 0.5) {
            alertas.push(`🔴 ${topCategoria[0]} representa ${Math.round((topCategoria[1]/despesasMes)*100)}% dos seus gastos!`);
        }
        
        // 3. Score financeiro (0-100)
        if(totalReceitas > 0) {
            const pctGasto = (totalDespesas / totalReceitas) * 100;
            if(pctGasto < 60) score = 90;
            else if(pctGasto < 80) score = 70;
            else if(pctGasto < 100) score = 50;
            else score = 30;
        }
        
        // 4. Recomendações personalizadas
        if(mesSaldo < 0) {
            recomendacoes.push('💡 Seu mês está negativo. Tente cortar gastos com ' + (topCategoria?.[0] || 'categorias com maior peso'));
        } else if(mesSaldo > 0 && mesSaldo < totalReceitas * 0.1) {
            recomendacoes.push('💡 Você está economizando pouco. Tente aumentar a reserva em 10%');
        }
        
        if(saldo < 0) {
            recomendacoes.push('🚨 Seu saldo total está negativo. Revise urgente seus gastos fixos');
        }
        
        // 5. Sugestão de reserva e lazer
        const reservaSugerida = totalDespesas * 6; // 6 meses de gastos
        const lazerSugerido = (totalReceitas * 0.1) / 12; // 10% da renda anual / 12
        
        // 6. Anualização
        const gastoAnual = totalDespesas * 12;
        const financProjetado = gastoAnual * 1.1; // 10% de inflação
        
        // HTML
        return `
            <div class="card bg-gradient-to-r ${score >= 70 ? 'from-emerald-900/30 to-emerald-800/30' : 'from-amber-900/30 to-amber-800/30'} border-${score >= 70 ? 'emerald' : 'amber'}-500/20">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-zinc-400 text-sm">Score de Saúde Financeira</p>
                        <h3 class="text-4xl font-bold text-white">${score}%</h3>
                    </div>
                    <div class="text-right">
                        <p class="text-sm">${score >= 70 ? '✅ Excelente!' : '⚠️ Precisa melhorar'}</p>
                        <p class="text-xs text-zinc-500">Baseado em ${totalReceitas > 0 ? Math.round((totalDespesas/totalReceitas)*100) : 0}% de gasto da renda</p>
                    </div>
                </div>
            </div>
            
            ${alertas.length > 0 ? `
                <div class="card border-rose-500/20 bg-rose-500/5">
                    <h4 class="text-rose-400 font-semibold mb-2">🔔 Alertas</h4>
                    ${alertas.map(a => `<p class="text-zinc-300 text-sm">${a}</p>`).join('')}
                </div>
            ` : ''}
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="card">
                    <p class="text-zinc-400 text-sm">💰 Reserva de Emergência</p>
                    <p class="text-lg font-bold text-emerald-400">${formatCurrency(reservaSugerida)}</p>
                    <p class="text-xs text-zinc-500">Equivalente a 6 meses</p>
                </div>
                <div class="card">
                    <p class="text-zinc-400 text-sm">🎯 Lazer Sugerido</p>
                    <p class="text-lg font-bold text-purple-400">${formatCurrency(lazerSugerido)}/mês</p>
                    <p class="text-xs text-zinc-500">10% da renda anual</p>
                </div>
                <div class="card">
                    <p class="text-zinc-400 text-sm">📈 Projeção Anual</p>
                    <p class="text-lg font-bold ${gastoAnual > totalReceitas ? 'text-rose-400' : 'text-white'}">${formatCurrency(gastoAnual)}</p>
                    <p class="text-xs text-zinc-500">Com inflação: ${formatCurrency(financProjetado)}</p>
                </div>
            </div>
            
            ${recomendacoes.length > 0 ? `
                <div class="card border-blue-500/20 bg-blue-500/5">
                    <h4 class="text-blue-400 font-semibold mb-2">💡 Recomendações da IA</h4>
                    ${recomendacoes.map(r => `<p class="text-zinc-300 text-sm">${r}</p>`).join('')}
                </div>
            ` : ''}
            
            <div class="card">
                <h4 class="text-zinc-300 font-semibold mb-3">📊 Resumo do Mês</h4>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <p class="text-zinc-500 text-sm">Receitas</p>
                        <p class="text-emerald-400 font-bold">${formatCurrency(receitasMes)}</p>
                    </div>
                    <div>
                        <p class="text-zinc-500 text-sm">Despesas</p>
                        <p class="text-rose-400 font-bold">${formatCurrency(despesasMes)}</p>
                    </div>
                    <div>
                        <p class="text-zinc-500 text-sm">Saldo do Mês</p>
                        <p class="${mesSaldo >= 0 ? 'text-emerald-400' : 'text-rose-400'} font-bold">${formatCurrency(mesSaldo)}</p>
                    </div>
                    <div>
                        <p class="text-zinc-500 text-sm">Gasto Médio Diário</p>
                        <p class="text-white font-bold">${formatCurrency(despesasMes / 30 || 0)}</p>
                    </div>
                </div>
            </div>
        `;
    }

    function gerarDicaFinanceira(saldo, receitas, despesas) {
        if(saldo > 0 && receitas > 0) {
            const pct = Math.round((saldo/receitas)*100);
            if(pct > 20) return `🎉 Excelente! Você está economizando ${pct}% da sua renda. Considere investir parte desse valor para multiplicar seu patrimônio.`;
            if(pct > 10) return `👍 Bom trabalho! Você está economizando ${pct}% da renda. Que tal aumentar para 20% aos poucos?`;
            return `💪 Continue firme! Você está no azul. Analise seus gastos para ver onde pode economizar ainda mais.`;
        }
        if(saldo < 0) {
            return `⚠️ Atenção! Seu saldo está negativo. Tente cortar gastos supérfluos e negociar dívidas. Lembre-se: 10% da renda deve ir para lazer, não mais.`;
        }
        return `📊 Acompanhe seus gastos de perto. Defina um orçamento mensal e tente não ultrapassá-lo.`;
    }

    function analisarFinancas() {
        renderAI();
        // Scroll para os resultados
        document.getElementById('ai-results').scrollIntoView({ behavior: 'smooth' });
    }

    // ============================================================
    // CHAT DA IA
    // ============================================================
    function enviarPerguntaIA() {
        const input = document.getElementById('chat-input');
        const pergunta = input.value.trim();
        if(!pergunta) return;
        
        const container = document.getElementById('chat-container');
        container.innerHTML += `<div class="chat-message chat-user">${pergunta}</div>`;
        input.value = '';
        
        const resposta = processarPerguntaIA(pergunta);
        setTimeout(() => {
            container.innerHTML += `<div class="chat-message chat-ai">${resposta}</div>`;
            container.scrollTop = container.scrollHeight;
        }, 500);
    }

    function processarPerguntaIA(pergunta) {
        const p = pergunta.toLowerCase();
        const transacoes = getFilteredTransactions();
        let totalReceitas = 0, totalDespesas = 0;
        let mesAtual = new Date().getMonth();
        let anoAtual = new Date().getFullYear();
        let receitasMes = 0, despesasMes = 0;
        let categorias = {};
        
        transacoes.forEach(t => {
            if(t.type === 'single') {
                const {y, m} = safeGetYearMonth(t.date);
                if(m === mesAtual && y === anoAtual) {
                    t.kind === 'income' ? receitasMes += t.value : despesasMes += t.value;
                }
                t.kind === 'income' ? totalReceitas += t.value : totalDespesas += t.value;
                if(t.kind === 'expense') {
                    categorias[t.category] = (categorias[t.category] || 0) + t.value;
                }
            } else if(t.type === 'installment' && t.installments) {
                t.installments.forEach(i => {
                    const {y, m} = safeGetYearMonth(i.date);
                    if(m === mesAtual && y === anoAtual) {
                        t.kind === 'income' ? receitasMes += i.value : despesasMes += i.value;
                    }
                    t.kind === 'income' ? totalReceitas += i.value : totalDespesas += i.value;
                    if(t.kind === 'expense') {
                        categorias[t.category] = (categorias[t.category] || 0) + i.value;
                    }
                });
            }
        });

        const saldo = totalReceitas - totalDespesas;
        const mesSaldo = receitasMes - despesasMes;
        
        if(p.includes('gasto') || p.includes('despesa') || p.includes('gastando')) {
            const top = Object.entries(categorias).sort((a,b) => b[1] - a[1])[0];
            return `📊 Seus maiores gastos são em ${top ? top[0] : 'nenhuma categoria ainda'}.\n\nTotal do mês: ${formatCurrency(despesasMes)}\nMédia diária: ${formatCurrency(despesasMes/30 || 0)}\n\n${gerarDicaFinanceira(saldo, totalReceitas, totalDespesas)}`;
        }
        
        if(p.includes('econom') || p.includes('guard') || p.includes('reserva')) {
            const reserva = totalDespesas * 6;
            return `💰 Sua reserva de emergência ideal é ${formatCurrency(reserva)} (6 meses de gastos).\n\nAtualmente você tem ${formatCurrency(saldo)} em saldo acumulado.\n${saldo >= reserva ? '✅ Parabéns! Você já atingiu sua reserva!' : `Faltam ${formatCurrency(reserva - saldo)} para atingir.`}`;
        }
        
        if(p.includes('lazer') || p.includes('diversão') || p.includes('viagem')) {
            const lazer = (totalReceitas * 0.1) / 12;
            return `🎯 Recomendo separar ${formatCurrency(lazer)} por mês para lazer (10% da sua renda anual).\n\nIsso dá ${formatCurrency(lazer * 12)} por ano para viagens, hobbies e entretenimento.`;
        }
        
        if(p.includes('invest') || p.includes('rentabilidade')) {
            return `📈 Dica de investimento:\n\n1. Comece com CDB ou Tesouro Selic (renda fixa)\n2. Crie reserva de emergência primeiro\n3. Evite investimentos com taxas altas\n4. Considere Fiis para renda passiva\n\nRecomendo: 60% renda fixa, 20% ações, 20% internacionais.`;
        }
        
        if(p.includes('dívida') || p.includes('parcela') || p.includes('financiamento')) {
            return `⚠️ Para gerenciar dívidas:\n\n1. Liste todas as dívidas com juros\n2. Pague as com maior juro primeiro\n3. Negocie parcelamentos\n4. Evite novos empréstimos\n\nConsidere usar 30% da sua renda para quitar dívidas.`;
        }
        
        if(p.includes('score') || p.includes('saúde') || p.includes('financeira')) {
            let score = 0;
            if(totalReceitas > 0) {
                const pct = (totalDespesas / totalReceitas) * 100;
                if(pct < 60) score = 90;
                else if(pct < 80) score = 70;
                else if(pct < 100) score = 50;
                else score = 30;
            }
            return `🏥 Seu score de saúde financeira é ${score}%\n\n${score >= 70 ? '✅ Você está com uma boa saúde financeira!' : '⚠️ Recomendo revisar seus gastos.'}\n\nSeu saldo atual: ${formatCurrency(saldo)}`;
        }
        
        return `🤖 Desculpe, não entendi sua pergunta. Posso ajudar sobre:\n\n• Gastos e despesas\n• Economia e reserva\n• Lazer e diversão\n• Investimentos\n• Dívidas e financiamentos\n• Score financeiro\n\nPergunte novamente!`;
    }

    // ============================================================
    // VIEW: USERS (CONFIGURAÇÃO)

    function renderUsers() {
        document.getElementById('view-users').innerHTML = `
            <h2 class="text-3xl font-bold text-white mb-8">Configurações</h2>
            <div class="card">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-zinc-300">Usuário</p>
                        <p class="text-white font-bold">${state.currentUser?.name || 'N/A'}</p>
                        <p class="text-xs text-zinc-500">${state.currentUser?.role || 'Usuário'}</p>
                    </div>
                    <button onclick="logout()" class="bg-rose-500/20 text-rose-400 px-4 py-2 rounded-xl text-sm hover:bg-rose-500/30 transition">
                        Sair
                    </button>
                </div>
            </div>
        `;

    // ============================================================
    // FUNÇÕES DE TRANSAÇÃO (MODAL)
    // ============================================================
    function openTransactionModal(kind) {
        const modal = document.getElementById('modal-transaction');
        document.getElementById('modal-content').innerHTML = `
            <h3 class="text-xl font-bold text-white mb-4">${kind === 'expense' ? 'Nova Despesa' : 'Nova Receita'}</h3>
            <div class="space-y-4">
                <input id="t-name" type="text" placeholder="Descrição" class="w-full bg-black border border-white/10 rounded-xl p-3 text-white text-sm focus:border-indigo-500 outline-none">
                <input id="t-store" type="text" placeholder="Loja/Origem" class="w-full bg-black border border-white/10 rounded-xl p-3 text-white text-sm focus:border-indigo-500 outline-none">
                <input id="t-value" type="number" placeholder="Valor" class="w-full bg-black border border-white/10 rounded-xl p-3 text-white text-sm focus:border-indigo-500 outline-none">
                <input id="t-date" type="date" class="w-full bg-black border border-white/10 rounded-xl p-3 text-white text-sm focus:border-indigo-500 outline-none">
                <select id="t-kind" class="w-full bg-black border border-white/10 rounded-xl p-3 text-white text-sm focus:border-indigo-500 outline-none">
                    <option value="expense">Despesa</option>
                    <option value="income">Receita</option>
                </select>
                <button onclick="submitTransaction('${kind}')" class="w-full bg-white text-black font-bold p-3 rounded-xl hover:bg-zinc-200 transition">Salvar</button>
            </div>
        `;
        modal.classList.add('open');
    }

    function submitTransaction(kind) {
        const name = document.getElementById('t-name').value;
        const store = document.getElementById('t-store').value;
        const value = parseFloat(document.getElementById('t-value').value);
        const date = document.getElementById('t-date').value;
        
        if(!name || !value || !date) return alert('Preencha todos os campos!');
        
        const transaction = {
            id: String(Date.now()),
            userId: String(state.currentUser.id),
            kind: kind,
            type: 'single',
            name,
            store,
            category: 'Geral',
            value,
            date,
            status: kind === 'expense' ? 'Pendente' : 'Recebido'
        };
        
        state.transactions.push(transaction);
        closeModal('modal-transaction');
        renderApp();
        apiPost('addTransaction', { transaction });
    }

    function openDetails(id) {
        const t = state.transactions.find(x => String(x.id) === String(id));
        if(!t) return;
        const modal = document.getElementById('modal-details');
        document.querySelector('#modal-details .modal-content').innerHTML = `
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-white">${t.name}</h3>
                <button onclick="closeModal('modal-details')" class="text-zinc-400 hover:text-white">✕</button>
            </div>
            <div class="space-y-2 text-sm">
                <p><span class="text-zinc-500">Valor:</span> <span class="text-white font-bold">${formatCurrency(t.value)}</span></p>
                <p><span class="text-zinc-500">Data:</span> <span class="text-white">${t.date}</span></p>
                <p><span class="text-zinc-500">Categoria:</span> <span class="text-white">${t.category}</span></p>
                <p><span class="text-zinc-500">Status:</span> <span class="${t.status === 'Pago' || t.status === 'Recebido' ? 'text-emerald-400' : 'text-amber-400'}">${t.status}</span></p>
                ${t.store ? `<p><span class="text-zinc-500">Loja:</span> <span class="text-white">${t.store}</span></p>` : ''}
            </div>
            <div class="flex gap-2 mt-6">
                <button onclick="deleteTransaction('${t.id}')" class="flex-1 bg-rose-500/20 text-rose-400 p-2 rounded-xl text-sm hover:bg-rose-500/30 transition">Excluir</button>
                <button onclick="closeModal('modal-details')" class="flex-1 bg-zinc-800 text-white p-2 rounded-xl text-sm hover:bg-zinc-700 transition">Fechar</button>
            </div>
        `;
        modal.classList.add('open');
    }

    function deleteTransaction(id) {
        if(!confirm('Confirmar exclusão?')) return;
        state.transactions = state.transactions.filter(x => String(x.id) !== String(id));
        closeModal('modal-details');
        renderApp();
        apiPost('deleteTransaction', { id });
    }

    // ============================================================
    // API HELPER
    // ============================================================
    async function apiPost(action, payload) {
        try {
            await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action, ...payload })
            });
        } catch(e) { console.error(e); }
    }

    function closeModal(id) {
        document.getElementById(id).classList.remove('open');
    }

    // ============================================================
    // INICIALIZAR
    // ============================================================
    switchTab('home');

    // ============================================================
    // SERVICE WORKER
    // ============================================================
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('SW registrado'))
                .catch(err => console.error('Erro SW:', err));
        });
    }
