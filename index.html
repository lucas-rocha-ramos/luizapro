    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        body { font-family: 'Inter', sans-serif; background-color: #000; color: #f4f4f5; -webkit-font-smoothing: antialiased; overflow-x: hidden; overscroll-behavior-y: none; }
        #app-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.6s ease-out, visibility 0.6s; }
        #app-loader.fade-out { opacity: 0; visibility: hidden; pointer-events: none; }
        .loader-ambient-glow { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at center, rgba(99, 102, 241, 0.15) 0%, rgba(0, 0, 0, 1) 70%); z-index: 1; }
        .loader-content { z-index: 10; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .loader-logo { width: 140px; height: 140px; object-fit: contain; filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.4)); margin-bottom: 30px; animation: pulse 2.5s infinite ease-in-out; }
        .loader-bar-container { width: 160px; height: 3px; background-color: rgba(255, 255, 255, 0.1); border-radius: 10px; overflow: hidden; position: relative; margin-top: 40px; }
        .loader-bar { position: absolute; top: 0; left: 0; height: 100%; width: 50%; background-color: #fff; box-shadow: 0 0 10px rgba(255, 255, 255, 0.5); border-radius: 10px; animation: shimmer 1.5s infinite ease-in-out; }

        @keyframes pulse { 0% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.4)); } 50% { transform: scale(1.05); filter: drop-shadow(0 0 40px rgba(99, 102, 241, 0.6)); } 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.4)); } }
        @keyframes shimmer { 0% { left: -50%; width: 40%; } 50% { left: 30%; width: 60%; } 100% { left: 100%; width: 20%; } }
        @keyframes fade-in-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-up { animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 5px; border: 2px solid #000; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }

        .view-section { display: none; padding-top: calc(8rem + env(safe-area-inset-top)); padding-bottom: calc(6rem + env(safe-area-inset-bottom)); padding-left: max(2rem, env(safe-area-inset-left)); padding-right: max(2rem, env(safe-area-inset-right)); max-width: 90rem; margin-left: auto; margin-right: auto; }
        @media (max-width: 768px) { .view-section { padding-top: calc(6rem + env(safe-area-inset-top)); padding-left: max(1.25rem, env(safe-area-inset-left)); padding-right: max(1.25rem, env(safe-area-inset-right)); padding-bottom: calc(8rem + env(safe-area-inset-bottom)); } }
        .view-section.active { display: block; animation: fade-in-up 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        .modal-overlay { display: none; position: fixed; inset: 0; z-index: 60; background-color: rgba(0, 0, 0, 0.6); backdrop-filter: blur(12px); align-items: center; justify-content: center; padding: max(1.5rem, env(safe-area-inset-top)); }
        .modal-overlay.open { display: flex; animation: fade-in-up 0.3s ease-out forwards; }
        .tab-btn.active { background-color: #27272a; color: white; box-shadow: 0 0 20px rgba(255, 255, 255, 0.05); }
        
        .type-btn { background-color: #18181b; padding: 1.25rem; border-radius: 1rem; text-align: center; font-size: 0.875rem; font-weight: 500; color: #a1a1aa; border: 1px solid rgba(255,255,255,0.05); transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 0.5rem; cursor: pointer; }
        .type-btn:hover { background-color: #27272a; }
        .type-btn.selected { background-color: #27272a; color: #fff; border-color: rgba(99, 102, 241, 0.5); }
        .type-btn svg { width: 1.5rem; height: 1.5rem; color: #a1a1aa; }
        .type-btn.selected svg { color: #fff; }

        /* Ajustes de tela e Safe Area para Celulares e Watch */
        #navbar { padding-top: env(safe-area-inset-top); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @media (max-width: 380px) {
            .loader-logo { width: 100px; height: 100px; }

            .text-4xl, .text-5xl { font-size: 2rem !important; }

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbx3_Mvtn3GZAt6d63Su9czCnOiW4uRBMznkwwqG-YzVEfkx9AtgCpd7MGKLE8qbHzuT-w/exec";
        const MONTHS = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
        const YEARS = [2023, 2024, 2025, 2026];

        let state = {
            currentUser: null, users: [], transactions: [], categories: [], selectedFilterUsers: [], activeTab: 'home',
            homeFilter: { month: new Date().getMonth(), year: new Date().getFullYear() },
            dashboardFilter: { month: new Date().getMonth(), year: new Date().getFullYear() },
            filterView: { category: 'Todas', month: new Date().getMonth(), year: new Date().getFullYear() },
            newTransaction: { type: 'single' }, modalMode: 'expense', editingId: null
        };

        window.addEventListener('load', () => {
            lucide.createIcons();
            setTimeout(() => {
                document.getElementById('app-loader').classList.add('fade-out');
                document.getElementById('login-view').classList.remove('hidden');
                setTimeout(() => { document.getElementById('login-view').classList.remove('opacity-0'); document.getElementById('login-view').classList.add('animate-fade-in-up'); }, 50);
                loadData();
            }, 3000);
        });

        async function loadData() {
            setLoading(true);
            try {
                const res = await fetch(`${API_URL}?action=getAllData`).then(r => r.json());
                state.users = Array.isArray(res.users) ? res.users : [];
                state.transactions = Array.isArray(res.transactions) ? res.transactions : [];
                state.categories = Array.isArray(res.categories) ? res.categories : [];
                if (state.currentUser) renderApp();
            } catch (e) { console.error(e); }
            setLoading(false);
        }

        async function apiPost(action, payload) {
            document.getElementById('sync-indicator').classList.remove('hidden');
            try { await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action, ...payload }) }); } catch(e) { console.error(e); }
            document.getElementById('sync-indicator').classList.add('hidden');
        }

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('login-username').value;
            const pass = document.getElementById('login-password').value;
            if(user === 'lucasrocha' && pass === '2025') {

        function formatCurrency(val) { return new Intl.NumberFormat('pt-BR', {style: 'currency', currency: 'BRL'}).format(val); }
        
        function safeGetYearMonth(dateStr) { 
            if(!dateStr) return {y:0, m:0}; 
            if(typeof dateStr === 'string' && dateStr.includes('-')) { 
                const p = dateStr.split('-'); 
                return {y: parseInt(p[0], 10), m: parseInt(p[1], 10) - 1}; 
            } 
            const d = new Date(dateStr); 
            return {y: d.getUTCFullYear(), m: d.getUTCMonth()}; 
        }

        function calculateInstallmentDate(base, offset) { 
            if(base && base.includes('-')) { 
                const p = base.split('-'); 
                const d = new Date(parseInt(p[0], 10), parseInt(p[1], 10) - 1 + offset, parseInt(p[2], 10)); 
                const y = d.getFullYear(); const m = String(d.getMonth()+1).padStart(2,'0'); const day = String(d.getDate()).padStart(2,'0'); 
                return `${y}-${m}-${day}`; 
            } 
            const d=new Date(base); d.setMonth(d.getMonth()+offset); return d.toISOString().split('T')[0]; 
        }

        function parseInputMoney(valStr) {
            let s = valStr.toString().trim();
            if (s.includes(',') && s.includes('.')) { s = s.replace(/\./g, '').replace(',', '.'); } else if (s.includes(',')) { s = s.replace(',', '.'); }
            return parseFloat(s);
        }

            state.selectedFilterUsers = state.users.map(u => String(u.id)); 
            renderApp(); 
        }
        
        function toggleUser(id) { 
            const strId = String(id);
            if(state.selectedFilterUsers.some(x => String(x) === strId)) { 
                state.selectedFilterUsers = state.selectedFilterUsers.filter(x => String(x) !== strId); 
            } else { 
                state.selectedFilterUsers.push(strId); 
            } 
            renderApp(); 
        }
        
        function renderUserFilter() {
            const list = state.users.map(u => {
                const isSelected = state.selectedFilterUsers.some(x => String(x) === String(u.id));
                return `<button onclick="toggleUser('${u.id}')" class="flex items-center gap-3 w-full p-2.5 rounded-xl text-sm transition-colors ${isSelected ? 'bg-white/10 text-white' : 'text-zinc-400 hover:text-white hover:bg-white/5'}"><div class="w-6 h-6 rounded-full bg-gradient-to-br ${u.color} flex items-center justify-center text-[9px] text-white font-bold border border-white/10">${u.avatar}</div><span class="flex-1 text-left font-medium">${u.name}</span>${isSelected ? '<i data-lucide="check" class="w-4 h-4 text-emerald-400"></i>' : ''}</button>`;
            }).join('');
            document.getElementById('user-filter-list').innerHTML = list;
            
            const avatars = state.selectedFilterUsers.slice(0, 3).map(id => { 
                const u = state.users.find(user => String(user.id) === String(id)); 
                return u ? `<div class="w-7 h-7 rounded-full bg-gradient-to-br ${u.color} border-2 border-zinc-900 flex items-center justify-center text-[9px] font-bold text-white">${u.avatar}</div>` : ''; 
            }).join('');
            
            document.getElementById('filter-avatars').innerHTML = avatars + (state.selectedFilterUsers.length > 3 ? `<div class="w-7 h-7 rounded-full bg-zinc-800 border-2 border-zinc-900 flex items-center justify-center text-[9px] text-white font-bold">+${state.selectedFilterUsers.length - 3}</div>` : '');
            document.getElementById('filter-label').innerText = state.selectedFilterUsers.length === state.users.length ? 'Todos' : 'Filtrar'; 
            lucide.createIcons();
        }

        function openTransactionModal(mode, editId = null) {
            state.modalMode = mode; 
            state.editingId = editId;
            document.getElementById('modal-title').innerText = editId ? 'Editar Transação' : (mode === 'expense' ? 'Nova Despesa' : 'Novo Recebimento');
            const catOpts = state.categories.filter(c => c.type === 'both' || c.type === mode).map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            
            const scanArea = `
                <div class="mb-6">
                    <label for="receipt-input" class="group relative flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-zinc-700 rounded-2xl cursor-pointer hover:bg-zinc-800/30 hover:border-indigo-500 transition-all bg-black/20">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6 text-zinc-400 group-hover:text-indigo-400 transition-colors"><i data-lucide="scan-line" class="w-8 h-8 mb-3"></i><p class="text-xs font-medium uppercase tracking-wide">Scan Nota ou PDF</p></div>
                        <input id="receipt-input" type="file" accept="image/*,application/pdf" capture="environment" class="hidden" onchange="handleReceiptScan(this)" />
                    </label>
                    <div id="ocr-loading" class="hidden mt-4 bg-zinc-800/50 p-4 rounded-xl border border-white/5"><div class="flex items-center justify-between text-indigo-400 text-xs font-medium mb-2"><span class="flex items-center gap-2"><i data-lucide="loader-2" class="w-3 h-3 animate-spin"></i> <span id="ocr-status">Iniciando IA...</span></span><span id="ocr-pct">0%</span></div><div class="w-full bg-black h-1.5 rounded-full overflow-hidden"><div id="ocr-progress" class="bg-indigo-500 h-full w-0 transition-all duration-300"></div></div></div>
                </div>
            `;

            document.getElementById('modal-content').innerHTML = `
                ${scanArea}
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div onclick="setTransType('single')" id="btn-type-single" class="type-btn selected"><i data-lucide="dollar-sign"></i>À Vista</div>
                    <div onclick="setTransType('installment')" id="btn-type-inst" class="type-btn"><i data-lucide="list-checks"></i>Parcelado</div>
                </div>
                <div id="trans-form" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4"><input id="t-store" type="text" placeholder="${mode==='expense'?'Loja':'Origem'}" class="w-full bg-black border border-white/10 rounded-2xl p-3.5 text-white text-sm focus:border-indigo-500 outline-none"><select id="t-cat" class="w-full bg-black border border-white/10 rounded-2xl p-3.5 text-white text-sm focus:border-indigo-500 outline-none"><option value="Geral">Sem Categoria</option>${catOpts}</select></div>
                    <input id="t-desc" type="text" placeholder="Descrição" class="w-full bg-black border border-white/10 rounded-2xl p-3.5 text-white text-sm focus:border-indigo-500 outline-none">
                    <div class="grid grid-cols-2 gap-4"><input id="t-val" type="text" placeholder="Valor Total" class="w-full bg-black border border-white/10 rounded-2xl p-3.5 text-white text-sm focus:border-indigo-500 outline-none"><input id="t-date" type="date" class="w-full bg-black border border-white/10 rounded-2xl p-3.5 text-white text-sm focus:border-indigo-500 outline-none [color-scheme:dark]"></div>
                    <div id="inst-inputs" style="display: none;"><input id="t-inst" type="number" placeholder="Qtd Parcelas" class="w-full bg-indigo-500/10 border border-indigo-500/30 rounded-2xl p-3.5 text-white text-sm focus:border-indigo-500 outline-none"></div>
                    <button onclick="submitTransaction()" class="w-full bg-white text-black font-bold p-4 rounded-2xl mt-4 hover:bg-zinc-200 transition-colors shadow-lg">Salvar</button>
                </div>`;
            
            lucide.createIcons(); 
            
            if (editId) {
                const t = state.transactions.find(x => String(x.id) === String(editId));
                if (t) {
                    document.getElementById('t-desc').value = t.name;
                    document.getElementById('t-store').value = t.store;
                    document.getElementById('t-cat').value = t.category;
                    document.getElementById('t-val').value = t.type === 'installment' ? t.installmentValue : t.value;
                    document.getElementById('t-date').value = t.date;
                    if (t.type === 'installment') document.getElementById('t-inst').value = t.totalInstallments;
                    setTransType(t.type);
                }
            } else {
                state.newTransaction.type = 'single'; 
                setTransType('single');
            }
            
            document.getElementById('modal-transaction').classList.add('open');
        }

        function setTransType(type) { 
            state.newTransaction.type = type; 
            const btnS = document.getElementById('btn-type-single'); 
            const btnI = document.getElementById('btn-type-inst');
            const instDiv = document.getElementById('inst-inputs');
            
            if(type === 'single') { 
                if(btnS) btnS.classList.add('selected');
                if(btnI) btnI.classList.remove('selected');
                if(instDiv) instDiv.style.display = 'none'; 
            } else { 
                if(btnI) btnI.classList.add('selected');
                if(btnS) btnS.classList.remove('selected');
                if(instDiv) instDiv.style.display = 'block'; 
            }
        }
        
        async function submitTransaction() {
            const type = state.newTransaction.type;
            const valInput = document.getElementById('t-val').value;
            const val = parseInputMoney(valInput);
            const date = document.getElementById('t-date').value;
            
            if (isNaN(val) || val <= 0 || !date) return alert("Preencha o valor e a data corretamente!");
            
            const cat = document.getElementById('t-cat').value;
            let instCount = 0;
            let totalValue = val; 
            let valPerInst = val; 

            if (type === 'installment') {
                const instDiv = document.getElementById('inst-inputs');
                if(instDiv.style.display === 'none') return alert("Erro: Selecione 'Parcelado' e preencha a quantidade de parcelas.");
                instCount = parseInt(document.getElementById('t-inst').value);
                if (isNaN(instCount) || instCount <= 0) return alert("Preencha a quantidade de parcelas corretamente.");
                totalValue = val * instCount; 
            }

            let status = state.modalMode === 'expense' ? (type === 'single' ? 'Pago' : 'Em andamento') : 'Recebido';

            const newId = state.editingId ? state.editingId : String(Date.now());
            const userId = state.editingId ? state.transactions.find(x => String(x.id) === String(state.editingId)).userId : String(state.currentUser.id);

            const payload = { id: newId, userId: userId, kind: state.modalMode, name: document.getElementById('t-desc').value, store: document.getElementById('t-store').value, category: cat, value: totalValue, date, status: status, type, installmentValue: type === 'installment' ? valPerInst : 0, totalInstallments: instCount, paidInstallments: 0, installments: [] };
            
            if(type === 'installment') {
                for(let i=0; i<instCount; i++) {
                    let instStatus = 'Pendente';
                    if (state.editingId) {
                        const oldT = state.transactions.find(x => String(x.id) === String(state.editingId));
                        if (oldT && oldT.type === 'installment' && oldT.installments[i]) instStatus = oldT.installments[i].status;
                    }
                    payload.installments.push({number: i+1, value: valPerInst, date: calculateInstallmentDate(date, i), status: instStatus});
                }
                payload.paidInstallments = payload.installments.filter(i => i.status === 'Pago').length;
                if(payload.paidInstallments === instCount) payload.status = 'Pago';
            } else if (state.editingId) {
                const oldT = state.transactions.find(x => String(x.id) === String(state.editingId));
                if (oldT && oldT.type === 'single') payload.status = oldT.status;
            }
            
            if (state.editingId) {
                const idx = state.transactions.findIndex(x => String(x.id) === String(state.editingId));
                if(idx !== -1) state.transactions[idx] = payload;
                closeModal('modal-transaction'); 
                renderCurrentView(); 
                state.editingId = null;
                await apiPost('updateTransaction', {transaction: payload});
            } else {
                state.transactions.push(payload); 
                closeModal('modal-transaction'); 
                renderCurrentView(); 
                await apiPost('addTransaction', {transaction: payload});
            }
        }

        function openCategoryModal() { document.getElementById('modal-category').classList.add('open'); }
        async function submitAddCategory() { const name = document.getElementById('new-cat-name').value; const type = document.getElementById('new-cat-type').value; if(!name) return; const cat = { id: String(Date.now()), name, type }; state.categories.push(cat); closeModal('modal-category'); renderCurrentView(); await apiPost('addCategory', { category: cat }); }
        async function deleteCategory(id) { if(!confirm('Remover categoria?')) return; state.categories = state.categories.filter(c => String(c.id) !== String(id)); renderCurrentView(); await apiPost('deleteCategory', { id }); }
        
        function openUserModal() { document.getElementById('modal-user').classList.add('open'); }
        async function submitAddUser() { const name = document.getElementById('new-user-name').value; const username = document.getElementById('new-user-username').value; const password = document.getElementById('new-user-password').value; if(!name||!username||!password) return alert("Preencha tudo"); const user = { id: String(Date.now()), name, username, password, role: 'Financeiro', avatar: name.substring(0,2).toUpperCase(), color: 'from-blue-500 to-cyan-500', status: 'Ativo' }; state.users.push(user); closeModal('modal-user'); renderCurrentView(); await apiPost('addUser', { user }); }
        async function deleteUser(id) { if(confirm('Remover usuário?')) { state.users = state.users.filter(u => String(u.id) !== String(id)); renderCurrentView(); await apiPost('deleteUser', { id }); } }

        function openDetails(id) {
            const t = state.transactions.find(x => String(x.id) === String(id)); if(!t) return;
            document.getElementById('detail-title').innerText = t.name; 
            document.getElementById('detail-store').innerText = t.store || ''; 
            document.getElementById('detail-value').innerText = formatCurrency(t.value);
            const container = document.getElementById('detail-content'); 
            
            let list = '';
            if (t.type === 'installment') {
                const progress = Math.round((t.paidInstallments / t.totalInstallments) * 100);
                const instList = t.installments.map(inst => `<div class="flex justify-between items-center p-4 border-b border-white/5 rounded-xl bg-zinc-800/20 mb-2"><div><span class="text-white font-medium text-sm">Parcela ${inst.number}</span> <span class="text-xs text-zinc-500 block">${inst.date}</span></div><button onclick="toggleInstallment('${t.id}', ${inst.number})" class="text-xs px-3 py-1.5 rounded-lg font-medium transition-colors ${inst.status==='Pago'?'bg-emerald-500/20 text-emerald-400 border border-emerald-500/20':'bg-white text-black hover:bg-zinc-200'}">${inst.status==='Pago'?'Pago':'Pagar'}</button></div>`).join('');
                list = `<div class="flex justify-between mb-2 text-xs font-medium text-zinc-400"><span>Progresso</span> <span>${progress}%</span></div><div class="h-3 bg-zinc-800 rounded-full overflow-hidden mb-6"><div class="h-full bg-gradient-to-r from-indigo-600 to-blue-500 transition-all duration-500" style="width:${progress}%"></div></div>${instList}`;
            } else {
                list = `<div class="flex justify-between items-center p-4 border-b border-white/5 rounded-xl bg-zinc-800/20 mb-2"><div><span class="text-white font-medium text-sm">Status</span> <span class="text-xs text-zinc-500 block">${t.date}</span></div><button onclick="toggleSingleStatus('${t.id}')" class="text-xs px-3 py-1.5 rounded-lg font-medium transition-colors ${t.status==='Pago'||t.status==='Recebido'?'bg-emerald-500/20 text-emerald-400 border border-emerald-500/20':'bg-white text-black hover:bg-zinc-200'}">${t.status==='Pago'||t.status==='Recebido'?'Feito':'Marcar Feito'}</button></div>`;
            }
            
            list += `<div class="grid grid-cols-2 gap-4 mt-6"><button onclick="editTransaction('${t.id}')" class="w-full bg-zinc-800 text-white font-medium py-3 rounded-xl border border-white/10 hover:bg-zinc-700 transition-colors flex items-center justify-center gap-2"><i data-lucide="edit-2" class="w-4 h-4"></i> Editar</button><button onclick="deleteTransaction('${t.id}')" class="w-full bg-rose-500/10 text-rose-500 font-medium py-3 rounded-xl border border-rose-500/20 hover:bg-rose-500/20 transition-colors flex items-center justify-center gap-2"><i data-lucide="trash-2" class="w-4 h-4"></i> Excluir</button></div>`;
            
            container.innerHTML = list;
            document.getElementById('modal-details').classList.add('open');
            lucide.createIcons();
        }

        async function toggleSingleStatus(id) {
            const t = state.transactions.find(x => String(x.id) === String(id));
            if(t.kind === 'expense') t.status = t.status === 'Pago' ? 'Pendente' : 'Pago';
            else t.status = t.status === 'Recebido' ? 'Pendente' : 'Recebido';
            openDetails(id); renderCurrentView();
            await apiPost('updateTransaction', { transaction: t });
        }

        async function toggleInstallment(tid, num) { const t = state.transactions.find(x => String(x.id) === String(tid)); t.installments.forEach(i => { if(i.number === num) i.status = i.status === 'Pago' ? 'Pendente' : 'Pago'; }); t.paidInstallments = t.installments.filter(i => i.status === 'Pago').length; t.status = t.paidInstallments === t.totalInstallments ? 'Pago' : 'Em andamento'; openDetails(tid); renderCurrentView(); await apiPost('updateTransaction', { transaction: t }); }

        function editTransaction(id) {
            const t = state.transactions.find(x => String(x.id) === String(id));
            closeModal('modal-details');
            setTimeout(() => openTransactionModal(t.kind, id), 100);
        }

        async function deleteTransaction(id) {
            if(!confirm('Tem certeza que deseja excluir esta transação?')) return;
            state.transactions = state.transactions.filter(x => String(x.id) !== String(id));
            closeModal('modal-details');
            renderCurrentView();
            await apiPost('deleteTransaction', { id });
        }

        function closeModal(id) { document.getElementById(id).classList.remove('open'); }
        function setLoading(b, id='login-loading-text') { const el=document.getElementById(id); if(el) b?el.classList.remove('hidden'):el.classList.add('hidden'); }
        
        async function handleReceiptScan(input) {
            const file = input.files[0]; if (!file) return;
            const loadingEl = document.getElementById('ocr-loading'); const statusEl = document.getElementById('ocr-status'); const progressEl = document.getElementById('ocr-progress');
            loadingEl.classList.remove('hidden');
            try {
                let imageUrl; if (file.type === 'application/pdf') { statusEl.innerText = "Lendo PDF..."; imageUrl = await convertPdfToImage(file); } else { imageUrl = URL.createObjectURL(file); }
                const worker = await Tesseract.createWorker('por', 1, { logger: m => { if (m.status === 'recognizing text') { progressEl.style.width = `${Math.round(m.progress * 100)}%`; } } });
                statusEl.innerText = "Analisando..."; const ret = await worker.recognize(imageUrl); const text = ret.data.text; await worker.terminate();
                const extractedValue = findValueInText(text); const extractedDate = findDateInText(text); const possibleStore = findStoreInText(text);
                autoCategorize(text);
                if (extractedValue) pulseField('t-val', extractedValue);
                if (extractedDate) pulseField('t-date', extractedDate); else pulseField('t-date', new Date().toISOString().split('T')[0]);
                if (possibleStore) { pulseField('t-store', possibleStore); document.getElementById('t-desc').value = "Compra: " + possibleStore; }
                loadingEl.innerHTML = `<div class="flex items-center gap-2 text-emerald-400 text-xs font-bold justify-center"><i data-lucide="check-circle" class="w-4 h-4"></i> Leitura OK!</div>`; lucide.createIcons();
                if(imageUrl && !imageUrl.startsWith('data:')) URL.revokeObjectURL(imageUrl);
            } catch (err) { console.error(err); loadingEl.innerHTML = `<span class="text-rose-400 text-xs">Erro na leitura. Tente outra.</span>`; }
        }

        async function convertPdfToImage(file) { const fileReader = new FileReader(); return new Promise((resolve, reject) => { fileReader.onload = async function() { try { const typedarray = new Uint8Array(this.result); const pdf = await pdfjsLib.getDocument(typedarray).promise; const page = await pdf.getPage(1); const viewport = page.getViewport({ scale: 2.0 }); const canvas = document.createElement('canvas'); const context = canvas.getContext('2d'); canvas.height = viewport.height; canvas.width = viewport.width; await page.render({ canvasContext: context, viewport: viewport }).promise; resolve(canvas.toDataURL('image/png')); } catch (e) { reject(e); } }; fileReader.readAsArrayBuffer(file); }); }

        function autoCategorize(text) {
            const textLower = text.toLowerCase(); let detectedCategory = null;
            const rules = [ { keywords: ['supermercado', 'mercado', 'atacadão', 'assai', 'carrefour', 'pão de açúcar', 'alimentos', 'hortifruti', 'smarket'], category: 'Mercado' }, { keywords: ['posto', 'gasolina', 'combustivel', 'petrobras', 'ipiranga', 'shell', 'etanol', 'diesel'], category: 'Transporte' }, { keywords: ['farmacia', 'drogaria', 'drugstore', 'pague menos', 'drogasil', 'raia'], category: 'Saúde' }, { keywords: ['restaurante', 'burger', 'pizza', 'ifood', 'delivery', 'bk', 'mcdonalds'], category: 'Alimentação' }, { keywords: ['uber', '99', 'taxi'], category: 'Transporte' } ];
            for (const rule of rules) { if (rule.keywords.some(k => textLower.includes(k))) { detectedCategory = rule.category; break; } }
            if (detectedCategory) {
                const select = document.getElementById('t-cat'); let found = false;
                for (let i = 0; i < select.options.length; i++) { if (select.options[i].value === detectedCategory) { select.selectedIndex = i; found = true; break; } }
                if (!found) { const newCat = { id: String(Date.now()), name: detectedCategory, type: 'expense' }; state.categories.push(newCat); const opt = document.createElement('option'); opt.value = detectedCategory; opt.text = detectedCategory; select.add(opt); select.value = detectedCategory; apiPost('addCategory', { category: newCat }); }
                pulseField('t-cat');
            }
        }

        function pulseField(id, value) { const el = document.getElementById(id); if(value) el.value = value; el.classList.add('border-indigo-500', 'bg-indigo-500/20'); setTimeout(() => el.classList.remove('border-indigo-500', 'bg-indigo-500/20'), 1500); }
        function findStoreInText(text) { const lines = text.split('\n'); const ignorePatterns = ['cnpj', 'cpf', 'enpj', 'im:', 'ie:', 'extrato', 'fiscal', 'cupom', 'danfe', 'sat', 'caixa', 'notinha', 'rua', 'av.', 'tel', 'item', 'qtd', 'total', 'pago', 'troco', 'crédito', 'débito', 'venda', 'data']; const cnpjRegex = /\d{2}[\.\s]?\d{3}[\.\s]?\d{3}[\/\s]?\d{4}[-\s]?\d{2}/; const candidates = lines.map(l => l.trim()).filter(l => { const lower = l.toLowerCase(); if (l.length < 3) return false; if (ignorePatterns.some(w => lower.includes(w))) return false; if (cnpjRegex.test(l)) return false; const digits = l.replace(/[^0-9]/g, '').length; if (digits > 4) return false; return true; }); if (candidates.length > 0) return candidates[0].replace(/^[^a-zA-Z0-9À-ÿ]+/, '').substring(0, 30).trim(); return null; }
        function findValueInText(text) { const lines = text.split('\n'); let maxVal = 0; const valorRegex = /R?\s?(\d{1,3}(\.?\d{3})*,\d{2})/gi; for (let line of lines) { const lowerLine = line.toLowerCase(); if ((lowerLine.includes('total') || lowerLine.includes('valor a pagar')) && !lowerLine.includes('subtotal') && !lowerLine.includes('itens')) { const match = line.match(valorRegex); if (match) { const v = parseMoney(match[match.length - 1]); if (v > 0) return v; } } const matches = line.match(valorRegex); if (matches) { matches.forEach(m => { const v = parseMoney(m); if (v > maxVal && v < 50000) maxVal = v; }); } } return maxVal > 0 ? maxVal : null; }
        
        function findDateInText(text) { const match = text.match(/(\d{2})[\/\s\.](\d{2})[\/\s\.](\d{4})/); return match ? `${match[3]}-${match[2]}-${match[1]}` : null; }
    </script>

        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').then(reg => console.log('Service Worker registrado!', reg)).catch(err => console.error('Erro no Service Worker', err)); }); }
    </script>
